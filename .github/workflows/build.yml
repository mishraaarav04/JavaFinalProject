name: Build Windows EXE

on: [push]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java with JavaFX
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'liberica'
          java-package: jdk+fx

      - name: Build JAR
        run: mvn package

      - name: Run jpackage
        run: |
          jpackage `
            --input target `
            --main-jar mp3-player-1.0-SNAPSHOT.jar `
            --main-class com.example.Main `
            --name "MP3 Player" `
            --type exe `
            --win-console `
            --add-modules javafx.controls,javafx.media,javafx.fxml

      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: mp3-player-exe
          path: "MP3 Player*.exe"